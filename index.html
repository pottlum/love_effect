<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>❤️</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #1a0a10 0%, #000 100%);
            touch-action: none; /* 防止移动端滑动 */
        }
        canvas { 
            display: block; 
            position: fixed;
            top: 0;
            left: 0;
        }
        .text-overlay {
            position: fixed;
            bottom: 15%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 22px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.9);
            z-index: 10;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="text-overlay">I Love You Forever ❤️</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 绘制超大爱心路径
        function drawHeart(ctx, x, y, size) {
            ctx.beginPath();
            const topCurveHeight = size * 0.3;
            ctx.moveTo(x, y + size / 2);
            // 左上方曲线
            ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + size / 3);
            // 左下方曲线
            ctx.bezierCurveTo(x - size / 2, y + size * 0.7, x, y + size * 1.1, x, y + size * 1.3);
            // 右下方曲线
            ctx.bezierCurveTo(x, y + size * 1.1, x + size / 2, y + size * 0.7, x + size / 2, y + size / 3);
            // 右上方曲线
            ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + size / 2);
            ctx.closePath();
        }

        class Particle {
            constructor(x, y, size, speed, color, type = 'heart') {
                this.x = x;
                this.y = y;
                this.size = size;
                this.baseSize = size;
                this.speedX = (Math.random() - 0.5) * speed;
                this.speedY = (Math.random() - 0.5) * speed;
                this.color = color;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                this.type = type; // 'heart' or 'dot'
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                this.size = this.baseSize * this.life;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                
                if (this.type === 'heart') {
                    drawHeart(ctx, 0, 0, this.size);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // 初始爆发
        function initBoom() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // 核心大爱心（超级大）
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    particles.push(new Particle(
                        centerX + (Math.random() - 0.5) * 50,
                        centerY + (Math.random() - 0.5) * 50,
                        Math.min(canvas.width, canvas.height) * 0.4, // 占据屏幕40%大小
                        0.5,
                        `hsl(${340 + Math.random() * 30}, 100%, ${70 + Math.random() * 20}%)`,
                        'heart'
                    ));
                }, i * 200);
            }

            // 周围散开的小爱心
            for (let i = 0; i < 80; i++) {
                const angle = (Math.PI * 2 / 80) * i;
                const speed = 4 + Math.random() * 4;
                particles.push(new Particle(
                    centerX,
                    centerY,
                    Math.random() * 40 + 20,
                    speed,
                    `hsl(${330 + Math.random() * 40}, 100%, 65%)`,
                    'heart'
                ));
                particles[particles.length - 1].speedX = Math.cos(angle) * speed;
                particles[particles.length - 1].speedY = Math.sin(angle) * speed;
            }

            // 闪烁的光点
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(
                    centerX,
                    centerY,
                    Math.random() * 4 + 1,
                    8,
                    `hsl(0, 0%, ${90 + Math.random() * 10}%)`,
                    'dot'
                ));
            }
        }

        // 持续飘动的小爱心
        function createFloaters() {
            if (particles.length < 300) {
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    canvas.height + 50,
                    Math.random() * 30 + 10,
                    1 + Math.random() * 2,
                    `hsla(${340 + Math.random() * 30}, 100%, 70%, 0.7)`,
                    'heart'
                ));
            }
        }

        window.onload = () => {
            initBoom();
            setInterval(createFloaters, 300);
        };

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0 && p.size > 0.5);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
