<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .heart-container {
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        .heart {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff4757 50%, #c0392b 100%);
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 
                0 0 60px rgba(255, 107, 157, 0.6),
                0 0 100px rgba(255, 71, 87, 0.4),
                0 0 140px rgba(192, 57, 43, 0.2);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            width: 200px;
            height: 200px;
            background: inherit;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before {
            top: -100px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 100px;
        }

        @keyframes pulse {
            0%, 100% {
                transform: rotate(-45deg) scale(1);
                box-shadow: 
                    0 0 60px rgba(255, 107, 157, 0.6),
                    0 0 100px rgba(255, 71, 87, 0.4),
                    0 0 140px rgba(192, 57, 43, 0.2);
            }
            50% {
                transform: rotate(-45deg) scale(1.05);
                box-shadow: 
                    0 0 80px rgba(255, 107, 157, 0.8),
                    0 0 120px rgba(255, 71, 87, 0.6),
                    0 0 160px rgba(192, 57, 43, 0.4);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 107, 157, 0.8);
            border-radius: 50%;
            animation: particle-float 4s ease-in-out infinite;
        }

        .particle:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 20%; left: 80%; animation-delay: 0.5s; }
        .particle:nth-child(3) { top: 30%; left: 20%; animation-delay: 1s; }
        .particle:nth-child(4) { top: 40%; left: 70%; animation-delay: 1.5s; }
        .particle:nth-child(5) { top: 50%; left: 30%; animation-delay: 2s; }
        .particle:nth-child(6) { top: 60%; left: 85%; animation-delay: 2.5s; }
        .particle:nth-child(7) { top: 70%; left: 15%; animation-delay: 3s; }
        .particle:nth-child(8) { top: 80%; left: 60%; animation-delay: 3.5s; }
        .particle:nth-child(9) { top: 15%; left: 50%; animation-delay: 0.8s; }
        .particle:nth-child(10) { top: 85%; left: 40%; animation-delay: 1.8s; }

        @keyframes particle-float {
            0%, 100% {
                transform: translateY(0) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translateY(-50px) scale(1.2);
                opacity: 0.4;
            }
        }

        .text-overlay {
            position: absolute;
            bottom: 10%;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Arial', sans-serif;
            font-size: 24px;
            letter-spacing: 8px;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 0.8;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    
    <div class="heart-container">
        <div class="heart"></div>
    </div>
    
    <div class="text-overlay">
        I ❤️ YOU
    </div>
</body>
</html>
